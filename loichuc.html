<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Lời Chúc 8/3</title>

<style>

body{
margin:0;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Segoe UI;
background-image:url("yeye.jpg");
background-size:cover;
background-position:center;
}

/* khung */

.container{
color:white;
background:rgba(0,0,0,0.35);
padding:40px 60px;
border-radius:20px;
text-align:center;
backdrop-filter:blur(6px);
z-index:2;
position:relative;
animation:fadeIn 2s;
}

/* tiêu đề */

h1{
font-size:45px;
font-style:italic;
margin-bottom:20px;

background:linear-gradient(270deg,#ff9ecf,#ffd1e8,#ffe4f3,#ff9ecf);
background-size:400%;
-webkit-background-clip:text;
color:transparent;

animation:mauchay 10s linear infinite;
}

/* gradient chạy */

@keyframes mauchay{
0%{background-position:0%}
100%{background-position:400%}
}

/* đoạn văn */

p{
font-size:22px;
margin:15px 0;
}

/* hàng icon hoa */

.flower-row{
margin-top:20px;
font-size:26px;
letter-spacing:6px;
}

/* hoa rơi */

.hoa{
position:fixed;
top:-50px;
font-size:25px;
animation:roi linear infinite;
z-index:0;
pointer-events:none;
}

@keyframes roi{

0%{
transform:translateY(-50px) rotate(0deg);
opacity:1;
}

100%{
transform:translateY(110vh) rotate(360deg);
opacity:0;
}

}

/* animation khung */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<div class="container">

<h1>Mừng Ngày 8/3 🌸</h1>

<p>
Em chúc các chị em trong server một ngày 8/3 thật vui và thật nhiều năng lượng nheee
</p>

<p>
Mong là mọi người luôn xinh đẹp, hạnh phúc và gặp thật nhiều điều tốt đẹp trong cuộc sống.
</p>

<p>
Chúc cho những dự định sắp tới của mọi người đều thuận lợi và thành công nữa 🌸
</p>

<div class="flower-row">
🌸 🌸 🌸 🌸 🌸 🌸 🌸 🌸 🌸 🌸
</div>

</div>

<script>

function taoHoa(){

const hoa=document.createElement("div");
hoa.classList.add("hoa");
hoa.innerHTML="🌸";

hoa.style.left=Math.random()*100+"vw";
hoa.style.animationDuration=(6+Math.random()*4)+"s";
hoa.style.fontSize=(18+Math.random()*20)+"px";

document.body.appendChild(hoa);

setTimeout(()=>{
hoa.remove();
},10000);

}

setInterval(taoHoa,300);

</script>

</body>
</html>
