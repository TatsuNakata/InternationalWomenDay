<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Lời Chúc 8/3</title>

<style>

body{
margin:0;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Segoe UI;
background-image:url("minecraft.jpg");
background-size:cover;
background-position:center;
}

/* khung lời chúc */

.container{
color:white;
background:rgba(0,0,0,0.35);
padding:40px 60px;
border-radius:20px;
text-align:center;
backdrop-filter:blur(6px);
z-index:2;
animation:fadeIn 2s;
}

/* tiêu đề */

h1{
font-size:45px;
font-style:italic;
text-shadow:0 0 10px pink,0 0 20px hotpink;
margin-bottom:20px;
}

/* chữ chuyển màu */

.text{
background:linear-gradient(270deg,#ff9a9e,#fbc2eb,#ffd6ff,#ff9a9e);
background-size:400%;
-webkit-background-clip:text;
color:transparent;
animation:mauchay 8s linear infinite;
}

@keyframes mauchay{
0%{background-position:0%}
100%{background-position:400%}
}

/* đoạn văn */

p{
font-size:22px;
margin:15px 0;
}

/* hoa rơi */

.hoa{
position:fixed;
top:-50px;
font-size:25px;
animation:roi linear infinite;
z-index:1;
}

@keyframes roi{
0%{
transform:translateY(-50px);
opacity:1;
}

100%{
transform:translateY(110vh);
opacity:0;
}
}

/* animation */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<div class="container">

<h1 class="text">Mừng Ngày 8/3 🌸</h1>

<p>
Em chúc các chị em trong server một ngày 8/3 thật vui và thật nhiều năng lượng nheee
</p>

<p>
Mong là mọi người luôn xinh đẹp, hạnh phúc và gặp thật nhiều điều tốt đẹp trong cuộc sống.
</p>

<p>
Chúc cho những dự định sắp tới của mọi người đều thuận lợi và thành công nữa 🌸
</p>

</div>

<script>

function taoHoa(){

const hoa=document.createElement("div");
hoa.classList.add("hoa");
hoa.innerHTML="🌸";

hoa.style.left=Math.random()*100+"vw";
hoa.style.animationDuration=(4+Math.random()*4)+"s";
hoa.style.fontSize=(20+Math.random()*15)+"px";

document.body.appendChild(hoa);

setTimeout(()=>{
hoa.remove();
},8000);

}

setInterval(taoHoa,400);

</script>

</body>
</html>
